<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="薬局在庫の簡易検索ツール — どの店舗に在庫があるかを素早く確認">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>💊 薬のお引越し — 在庫検索</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- ========== ローディングスクリーン ========== -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-pill">💊</div>
            <h2>薬のお引越し</h2>
            <p class="loading-sub">在庫検索を読み込み中...</p>
            <div class="loading-bar">
                <div class="loading-bar-inner"></div>
            </div>
        </div>
    </div>

    <!-- ========== トースト通知 ========== -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ========== メインアプリ ========== -->
    <div id="app" class="app hidden">

        <!-- ===== ヘッダー ===== -->
        <header class="app-header">
            <div class="header-inner">
                <h1 class="header-title">
                    <span class="header-icon">💊</span>
                    薬のお引越し
                </h1>
                <span class="header-badge">在庫検索</span>
            </div>
            <div class="data-info" id="data-info"></div>
        </header>

        <!-- ===== 検索エリア ===== -->
        <main class="main-content">
            <div class="search-area">
                <div class="search-box-wrapper">
                    <input type="text" id="search-input" class="search-input"
                           placeholder="薬品名を入力..." autocomplete="off">
                    <button class="add-drug-btn" id="btn-add-drug" title="検索リストに追加">＋</button>
                </div>
                <div class="selected-drugs-container" id="selected-drugs-container"></div>
                <div class="autocomplete-list hidden" id="autocomplete-list"></div>
            </div>

            <!-- ===== 表示モード選択 ＆ 店舗フィルター ===== -->
            <div class="filter-toggle-container hidden" id="filter-toggle-container">
                <div class="filter-left-options">
                    <label class="btn-filter-toggle option-label" for="chk-fuzzy-search">
                        <input type="checkbox" id="chk-fuzzy-search" class="option-checkbox" checked>
                        <span>🔍 あいまい</span>
                    </label>
                    <div class="view-mode-selector hidden" id="view-mode-selector">
                        <button class="view-mode-btn active" id="btn-mode-normal">💊 薬品別</button>
                        <button class="view-mode-btn" id="btn-mode-and">🤝 同時保有</button>
                    </div>
                    <div class="min-match-selector hidden" id="min-match-selector">
                        <span class="min-match-label">最低</span>
                        <select id="min-match-count" class="min-match-select"></select>
                        <span class="min-match-label">品目</span>
                    </div>
                </div>
                <button class="btn-filter-toggle" id="btn-filter-toggle">
                    <span class="filter-icon-setting">⚙️</span> フィルター <span id="filter-count"></span>
                </button>
            </div>

            <!-- ===== 店舗フィルターパネル ===== -->
            <div id="filter-panel" class="filter-panel hidden">
                <div class="filter-header">
                    <h3>表示する店舗を選択</h3>
                    <div class="filter-actions">
                        <button class="btn-filter-action" id="btn-store-all">全選択</button>
                        <button class="btn-filter-action btn-outline" id="btn-store-clear">全解除</button>
                    </div>
                </div>
                <div class="store-grid" id="store-filter-list">
                    <!-- JSで動的に店舗名チェックボックスが挿入されます -->
                </div>
            </div>

            <!-- ===== 検索結果 ===== -->
            <div id="results-area" class="hidden">
                <div class="results-header">
                    <span class="results-count" id="results-count"></span>
                </div>
                <div id="results-list"></div>
            </div>

            <!-- ===== 初期メッセージ ===== -->
            <div id="welcome-area" class="welcome-area">
                <div class="welcome-icon">🔎</div>
                <p class="welcome-text">薬品名を入力して<br>在庫のある店舗を検索できます</p>
                <p class="welcome-sub">在庫の「有無」と「出庫頻度」が確認できます</p>
            </div>

            <!-- ===== データ未読み込み時 ===== -->
            <div id="no-data-area" class="no-data-area hidden">
                <div class="no-data-icon">📥</div>
                <p class="no-data-text">データが読み込まれていません</p>
                <p class="no-data-sub">管理者が出力した shared-data-mobile.json を<br>以下から読み込んでください</p>
                <div class="drop-zone-mobile" id="drop-zone-mobile">
                    <p>📥 ファイルをタップして選択<br>またはドラッグ＆ドロップ</p>
                    <input type="file" accept=".json" id="file-mobile-import" hidden>
                </div>
                <div class="file-status" id="status-mobile-import"></div>
            </div>
        </main>
    </div>

    <!-- ========== 薬品詳細モーダル (在庫なし薬品の在庫あり店舗確認用) ========== -->
    <div id="drug-detail-modal" class="modal hidden">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-drug-name">薬品名</h3>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-store-list" class="modal-store-list">
                    <!-- 在庫あり店舗の一覧が動的に挿入されます -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
